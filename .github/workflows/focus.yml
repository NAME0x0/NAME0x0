name: Update Current Focus

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-focus:
    runs-on: ubuntu-latest
    name: Sync current focus

    steps:
      - uses: actions/checkout@v4

      - name: Update README focus block
        run: |
          python3 - <<'PYEOF'
          import re

          focus = "Just surviving"

          with open("README.md", "r") as f:
              content = f.read()

          pattern = r"(<!--START_SECTION:focus-->).*?(<!--END_SECTION:focus-->)"
          replacement = f"\\1\n{focus}\n\\2"
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet --staged || git commit -m "chore: update current focus section"
          git pull --rebase
          git push
