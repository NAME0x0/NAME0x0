name: Refresh README Assets

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    name: Refresh cards, stats, and stoic plates

    steps:
      - uses: actions/checkout@v4

      - name: Install Pillow
        run: pip install --quiet pillow

      - name: Render ASCII profile card (self-hosted, keep last good copy on failure)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 render_card.py || true
        working-directory: scripts

      - name: Render stats and stoic plates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/render_plates.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg assets/stats.svg assets/stoic.svg assets/focus.svg assets/shipping.svg assets/streak.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh README assets"
            git push
          fi
