<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-label="NAME0x0 — AI engineer, systems architect. Care of Muhammad Afsah Mumtaz, Dubai.">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .role { opacity: 0; animation: cycle 12s linear infinite; }
    .r2 { animation-delay: 3s; }
    .r3 { animation-delay: 6s; }
    .r4 { animation-delay: 9s; }
    @keyframes cycle {
      0% { opacity: 0; }
      2% { opacity: 1; }
      23% { opacity: 1; }
      25% { opacity: 0; }
      100% { opacity: 0; }
    }
    .tick { animation: blink 2s steps(2, start) infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }
  </style>
  <rect width="1200" height="220" fill="#0A0A0A"/>
  <rect x="0" y="0" width="1200" height="3" fill="#FF6B00"/>

  <text x="26" y="118" font-size="96" font-weight="900" letter-spacing="2" fill="#F4F1EA">NAME0x0</text>
  <rect class="tick" x="1048" y="24" width="12" height="12" fill="#FF6B00"/>
  <text x="1172" y="34" text-anchor="end" font-size="12" font-weight="700" letter-spacing="3" fill="#F4F1EA" opacity="0.55">EST. 2022</text>

  <g font-size="24" font-weight="800" letter-spacing="8" fill="#FF6B00">
    <text class="role"    x="28" y="168">&#8220;AI ENGINEER&#8221;</text>
    <text class="role r2" x="28" y="168">&#8220;SYSTEMS ARCHITECT&#8221;</text>
    <text class="role r3" x="28" y="168">&#8220;MULTI-AGENT WRANGLER&#8221;</text>
    <text class="role r4" x="28" y="168">&#8220;FROM-SCRATCH ABSOLUTIST&#8221;</text>
  </g>

  <rect x="26" y="186" width="1148" height="1" fill="#F4F1EA" opacity="0.25"/>
  <text x="28" y="206" font-size="11" font-weight="600" letter-spacing="3" fill="#F4F1EA" opacity="0.7">c/o MUHAMMAD AFSAH MUMTAZ &#8212; DUBAI, UAE</text>
  <text x="1172" y="206" text-anchor="end" font-size="11" font-weight="600" letter-spacing="3" fill="#F4F1EA" opacity="0.7">LOCAL-FIRST. SOVEREIGN. HANDMADE.</text>
</svg>
