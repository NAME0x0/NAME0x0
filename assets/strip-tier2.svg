    <text x="428" y="74" font-size="10.5" font-weight="600" letter-spacing="1.5" opacity="0.7">BUILD &#183; RUST &#183; HEAD IN CLOUDS, YES</text>

    <text x="828" y="38" font-size="17" font-weight="900" letter-spacing="3">&#8220;PANE&#8221;</text>
