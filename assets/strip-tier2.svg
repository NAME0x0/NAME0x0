<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="90" viewBox="0 0 1200 90" role="img" aria-label="Also in the workshop: WebDesk — any website or shader as a live Windows wallpaper. OMNI — a 1.05 trillion parameter sparse mixture-of-experts research build in Rust. pane — real Linux desktops on Windows.">
